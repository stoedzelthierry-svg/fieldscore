services:
  # Backend API
  - type: web
    name: fieldscore-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./fieldscore.db
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: AGRIBALYSE_VERSION
        value: "3.2"
      - key: ECOBALYSE_ENABLED
        value: "true"
