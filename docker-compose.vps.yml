version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./fieldscore.db
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=["*"]
    volumes:
      - fieldscore_data:/app/data
      - fieldscore_db:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
    restart: unless-stopped

volumes:
  fieldscore_data:
  fieldscore_db:
